- name: installing docker and jenkins
  hosts: jenkins
  become: yes
  gather_facts: false
  tasks: 
    - name: Update apt
      apt:
        update_cache: yes
        cache_valid_time: 300

    - name: install required packages
      apt:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Add Docker's GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
    
    - name: Add Docker repo
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu noble stable
        state: present
    
    - name: Install Docker
      apt: 
        name: docker-ce
        state: present
        update_cache: yes

    - name: Start Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Update apt cache
      apt:
        update_cache: yes
    
    - name: Install required packages
      apt:
        name:
          - fontconfig
          - openjdk-21-jre
        state: present

    - name: Download Jenkins GPG Key
      get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /etc/apt/keyrings/jenkins-keyring.asc
        mode: '644'

    - name: Add Jenkins repository
      apt_repository:
        repo: deb [signed-by=/etc/apt/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian binary/
        state: present
        filename: jenkins

    - name: Update apt cache after adding repo
      apt:
        update_cache: yes

    - name: Install Jenkins
      apt:
        name: jenkins
        state: present

    - name: Start Jenkins Service
      service:
        name: jenkins
        state: started
        enabled: yes
    
    - name: Add users to Docker group
      user:
        name: "{{ item}}"
        groups: docker
        append: yes
      loop:
        - jenkins
        - ubuntu

